name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the deploy job to publish to Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let a newer push cancel an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # Project pages are served from /<repo>/, so assets must resolve under that
      # subpath. Docker/local builds leave VITE_BASE unset and serve from root.
      - run: bun run build
        env:
          VITE_BASE: /dbml-flow/

      # Bake two demo databases into the Pages build only (the Docker image is
      # unaffected). With 2+ in the manifest, the live demo opens the picker.
      - name: Stage demo databases
        run: bash scripts/stage-demo.sh dist/dbml

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
