name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      released: ${{ steps.bump.outputs.released }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pipx install commitizen

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          set +e
          cz bump --yes --changelog
          code=$?
          set -e
          if [ "$code" -eq 0 ]; then
            TAG=$(git describe --tags --abbrev=0)
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          elif [ "$code" -eq 3 ] || [ "$code" -eq 21 ]; then
            echo "No releasable commits found; skipping release."
            echo "released=false" >> "$GITHUB_OUTPUT"
          else
            echo "cz bump failed with exit code $code"
            exit "$code"
          fi

      - name: Push release commit and tag
        if: steps.bump.outputs.released == 'true'
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          git push --atomic origin HEAD:main "refs/tags/${TAG}"

      # Slice this version's section out of the changelog and publish it as a
      # GitHub Release. Done in the same run because the token-pushed tag
      # cannot trigger a tag-based workflow.
      - name: Create GitHub Release
        if: steps.bump.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          VERSION="${TAG#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^##[[:space:]]+v?"ver"([[:space:]]|$)" {on=1; next}
            on && /^##[[:space:]]/ {exit}
            on {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for details." > release-notes.md
          fi
          gh release create "$TAG" --title "$TAG" --notes-file release-notes.md

  build:
    needs: version
    if: needs.version.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.tag }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.version.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.version.outputs.tag }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
