server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Baked DBML (optional): real 404 when absent, never SPA-fallback.
  location /dbml/ {
    try_files $uri =404;
  }

  # SPA fallback for everything else.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
